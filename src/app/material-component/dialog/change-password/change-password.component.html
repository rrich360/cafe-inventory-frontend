<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-6 offset-md-3">
        <div class="card">
          <div class="card-header card-header-primary">
            <h4 class="card-title">Change Password</h4>
            <p class="card-category">Update your account password</p>
          </div>
          <div class="card-body">
            <form [formGroup]="changePasswordForm">

              <mat-label>Username</mat-label>
              <div class="input-group form-group-no-border" style="margin-bottom: 12px;">
                <div class="input-group-prepend">
                  <span class="input-group-text"><mat-icon>person</mat-icon></span>
                </div>
                <input
                  class="form-control"
                  matInput
                  placeholder="Your Username"
                  formControlName="currentUsername"
                  type="text"
                  required
                />
              </div>

              <mat-label>Current Password</mat-label>
              <div class="input-group form-group-no-border" style="margin-bottom: 12px;">
                <div class="input-group-prepend">
                  <span class="input-group-text"><mat-icon>lock</mat-icon></span>
                </div>
                <input
                  class="form-control"
                  matInput
                  placeholder="Current Password"
                  formControlName="currentPassword"
                  [type]="hideOld ? 'password' : 'text'"
                  required
                />
                <button type="button" mat-icon-button (click)="hideOld = !hideOld">
                  <mat-icon>{{ hideOld ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </div>

              <mat-label>New Password</mat-label>
              <div class="input-group form-group-no-border" style="margin-bottom: 12px;">
                <div class="input-group-prepend">
                  <span class="input-group-text"><mat-icon>lock_open</mat-icon></span>
                </div>
                <input
                  class="form-control"
                  matInput
                  placeholder="New Password"
                  formControlName="newPassword"
                  [type]="hideNew ? 'password' : 'text'"
                  required
                />
                <button type="button" mat-icon-button (click)="hideNew = !hideNew">
                  <mat-icon>{{ hideNew ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </div>

              <mat-label>Confirm New Password</mat-label>
              <div class="input-group form-group-no-border" style="margin-bottom: 12px;">
                <div class="input-group-prepend">
                  <span class="input-group-text"><mat-icon>lock_open</mat-icon></span>
                </div>
                <input
                  class="form-control"
                  matInput
                  placeholder="Confirm New Password"
                  formControlName="confirmPassword"
                  [type]="hideConfirm ? 'password' : 'text'"
                  required
                />
                <button type="button" mat-icon-button (click)="hideConfirm = !hideConfirm">
                  <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </div>

              <small *ngIf="validateSubmit()" style="color: red; display: block; margin-bottom: 10px;">
                New Password and Confirm Password do not match.
              </small>

              <div class="text-right">
                <button
                  class="btn btn-danger btn-round"
                  type="button"
                  (click)="cancel()"
                >
                  Cancel
                </button>
                <button
                  class="btn btn-round"
                  style="background-color: #00704A; color: #fff;"
                  type="button"
                  [disabled]="!changePasswordForm.valid || validateSubmit()"
                  (click)="handleSubmit()"
                >
                  Change Password
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
