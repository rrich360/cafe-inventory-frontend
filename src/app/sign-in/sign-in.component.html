<div class="wrapper">
    <div class="page-header" style="background-image: url('../../assets/img/bck-grnd-city-view-bridge-boats-docks-carnival-screen_saver.png');">
        <div class="filter"></div>
            <div class="container">
                <div class="row">
                    <div class="col-lg-4 col-sm-6 mr-auto ml-auto">
                      <div class="card card-register">
                          <h3 class="title">Welcome User</h3>
                          <!-- <div class="social-line text-center">
                              <a href="#pablo" class="btn btn-neutral btn-facebook btn-just-icon">
                                  <i class="fa fa-facebook-square"></i>

                              <a href="#pablo" class="btn btn-neutral btn-google btn-just-icon">

                          <form [formGroup]= "signInForm" class="signIn-form">

                              <mat-label>Email</mat-label>
                              <div class="input-group form-group-no-border" [ngClass]="{'input-group-focus':focus===true}">
                                <div class="input-group-prepend">
                                  <span class="input-group-text">

                                    <mat-icon matSuffix>email</mat-icon>

                                  </span>
                                </div>
                                  <input matInput type="text" class="form-control" placeholder="Username" (focus)="focus=true" (blur)="focus=false" 
                                  matInput formControlName="username" required>
                              </div>
                              <!-- <mat-error *ngIf= "signInForm.controls.username.touched && signInForm.contorls.invalid">
                                  <span *ngIf= "signInForm.controls.username.errors.required">This field is mandtory.</span>
                              </mat-error> -->
                              <br>

                              <mat-label>Password</mat-label>
                              <div class="input-group form-group-no-border" [ngClass]="{'input-group-focus':focus1===true}">
                                <div class="input-group-prepend">
                                  <span class="input-group-text">

                                    <mat-icon matSuffix>key</mat-icon>

                                  </span>
                                </div>
                                  <input matInput class="form-control" placeholder="Password" (focus)="focus1=true" (blur)="focus1=false"
                                  formControlName="password" required [type]= "hide ? 'password': 'text'">
                                  <div class="input-group-append">
                                    <span class="input-group-text" (click)="hide = !hide" style="cursor: pointer;">
                                      <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                                    </span>
                                  </div>
                              </div>
                              <!-- <mat-error *ngIf= "signInForm.controls.password.touched && signInForm.contorls.password.invalid">
                                <span *ngIf= "signInForm.controls.password.errors.required">This field is mandtory.</span>
                            </mat-error> -->
                            <br>

                              <button type= "submit" class= "btn btn-danger btn-block btn-round" (click)= "handleSubmit()" 
                              > Sign In </button>

                          </form>

                          <div class="forgot">
                              <a href="#" class="btn btn-link btn-danger">Forgot password?</a>
                          </div>
                      </div>
                    </div>
                </div>
                
            </div>
        </div>  
     </div>
