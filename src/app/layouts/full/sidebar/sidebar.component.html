<mat-nav-list>

    <span>&nbsp; Dashboard</span>
  </a>

  <a mat-list-item routerLink="/cafe/order" routerLinkActive="active-link">
    <mat-icon>shopping_cart</mat-icon>

  <a mat-list-item routerLink="/cafe/viewstockorders" routerLinkActive="active-link">
